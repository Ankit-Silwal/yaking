version: '3.9'

services:
  redis:
    image: redis:7
    ports:
      - "6969:6379"
    restart: always
  
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: codestream
    ports:
      - "2222:5432"
    restart: always